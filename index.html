<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR Delivery ASWA</title>
<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f0f0f0;
}

/* CONTENEDOR PRINCIPAL */
.banner{
    width:800px;
    height:1200px;
    background:linear-gradient(#ffe600,#ffd400);
    position:relative;
    overflow:hidden;
    text-align:center;
}

/* LOGO */
.logo{
    width:350px;
    margin-top:60px;
}

/* QR BOX */
.qr-container{
    background:white;
    width:500px;
    padding:30px;
    border-radius:30px;
    margin:40px auto;
}

.qr{
    width:100%;
}

/* BOTON */
.boton{
    background:#1a9d8f;
    color:white;
    padding:20px;
    border-radius:50px;
    width:400px;
    margin:20px auto;
    font-size:28px;
    font-weight:bold;
}

/* TEXTO FINAL */
.frase{
    font-size:60px;
    color:#0a7d2f;
    font-weight:bold;
    margin-top:30px;
}

</style>
</head>

<body>

<div class="banner">

    <!-- CAMBIA EL LOGO -->
    <img src="logo de aswa.jpg" class="logo">

    <!-- QR -->
    <div class="qr-container">
        <img src="qr-aswa.jpg" class="qr">
    </div>

    <!-- TEXTO EDITABLE -->
    <div class="boton">
       📱 Escanea aquí y pide tu delivery
    </div>

    <!-- FRASE EDITABLE -->
    <div class="frase">
        El oro líquido de selva.
    </div>

</div>

</body>
</html>
